<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your password changed</title>
</head>
<body>
    <h1>
        Dear <span th:text="${firstName}">User</span>,
    </h1>

    <p>
        Your password have been changed by an administrator.
    </p>

    <p>
        For more information, contact:
        <strong th:text="${adminEmail}">user@example.com</strong>
    </p>
</body>
</html>
